[alias]
b = "build --features compile-cpp"
bo = "build --features compile-cpp,optimized-tests"
bt = "b --tests -vv"
bto = "bo --tests -vv"
co = "check --features optimized-tests"
r = "run --features compile-cpp"
t = "test --features compile-cpp"
to = "bo --tests -vv"
nt = "nextest run --features compile-cpp"
nto = "nextest run --features compile-cpp,optimized-tests"
