[alias]
b = "build --features compile-cpp"
bt = "build --features compile-cpp,optimized-tests"
ct = "check --features optimized-tests"
r = "run --features compile-cpp"
t = "test --features compile-cpp"
tb = "b --tests -vv"
tt = "test --features compile-cpp,optimized-tests"
ttb = "bt --tests -vv"
nt = "nextest run --features compile-cpp"
ntt = "nextest run --features compile-cpp,optimized-tests"
